<!doctype html>
<html lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Sushi club</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<header class="header">
			<a href="#" class="logo">Sushi club</a>

			<nav class="nav">
				<ul class="nav__list">
					<li class="nav__item">
						<a href="#about" class="nav__link">О нас</a>
					</li>
					<li class="nav__item">
						<a href="#menu" class="nav__link">Меню</a>
					</li>
					<li class="nav__item">
						<a href="#story" class="nav__link">История</a>
					</li>
					<li class="nav__item">
						<a href="#order" class="nav__link">Заказать</a>
					</li>
				</ul>
			</nav>
		</header>
		<section class="promo">
			<div class="promo__content">
				<h1 class="promo__title">
					Доставка <br />
					свежих роллов
				</h1>
				<p class="promo__text">
					Бесплатная доставка за 45 минут или за наш счёт!
				</p>

				<div class="promo_action">
					<button class="button button-primary">Заказать сейчас</button>
					<img class="promo__icon" src="icons/delivery.svg" alt="" />
				</div>
			</div>
			<div class="promo__image"></div>
		</section>
	</body>
</html>
